<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Школьная столовая</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 40%, #6d28d9 75%, #7c3aed 100%);
        }

        .login-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            width: 100%; max-width: 400px; padding: 20px;
        }

        .brand {
            text-align: center; color: white;
        }
        .brand .logo { font-size: 48px; line-height: 1; margin-bottom: 8px; }
        .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
        .brand p  { font-size: 13px; opacity: 0.65; margin-top: 4px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 18px; font-weight: 700; color: #1e1b4b;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-size: 13px; font-weight: 600; color: #374151;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid #e5e7eb; border-radius: 8px;
            font-size: 14px; color: #1e1b4b;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
        }

        .btn-login {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: opacity .2s, transform .15s;
        }
        .btn-login:hover  { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .alert {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 500; margin-bottom: 16px;
        }
        .alert-error   { background: #fee2e2; color: #991b1b; border-left: 4px solid #dc2626; }
        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid #059669; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand">
            <div class="logo">🏫</div>
            <h1>Школьная столовая</h1>
            <p>Система управления питанием</p>
        </div>

        <div class="card">
            <h2>Вход в систему</h2>

            {% if messages %}
                {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-login">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
